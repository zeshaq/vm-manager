<!DOCTYPE html>
<html>
<head>
    <title>VNC — {{ vm_name }}</title>
    <meta charset="utf-8">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0f172a; color: #cbd5e1; font-family: system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        #topbar {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 12px; background: #1e293b; border-bottom: 1px solid #334155;
            flex-shrink: 0;
        }
        #topbar .back-btn {
            background: #334155; color: #94a3b8; border: none; padding: 5px 10px;
            border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        #topbar .back-btn:hover { background: #475569; color: #e2e8f0; }
        #topbar .title { font-weight: 600; color: #e2e8f0; font-size: 14px; margin-right: auto; }

        #clipboard-area {
            display: flex; align-items: center; gap: 6px;
        }
        #clipboard-text {
            background: #0f172a; border: 1px solid #334155; color: #e2e8f0;
            border-radius: 6px; padding: 5px 10px; font-size: 13px;
            width: 260px; resize: none; height: 32px; line-height: 1.4;
        }
        #clipboard-text:focus { outline: none; border-color: #38bdf8; }
        .cb-btn {
            background: #1d4ed8; color: #fff; border: none; padding: 5px 12px;
            border-radius: 6px; cursor: pointer; font-size: 13px; white-space: nowrap;
        }
        .cb-btn:hover { background: #2563eb; }
        .cb-btn.secondary { background: #334155; color: #94a3b8; }
        .cb-btn.secondary:hover { background: #475569; color: #e2e8f0; }
        .cb-btn.success { background: #15803d !important; }

        #status {
            font-size: 12px; padding: 2px 8px; border-radius: 4px;
            background: #1e3a5f; color: #7dd3fc;
        }
        #status.connected { background: #14532d; color: #86efac; }
        #status.disconnected { background: #7f1d1d; color: #fca5a5; }

        #vnc-canvas { flex: 1; overflow: hidden; }
        #vnc-canvas > * { width: 100% !important; height: 100% !important; }
    </style>
    <script type="module">
        import RFB from 'https://cdn.jsdelivr.net/npm/@novnc/novnc/core/rfb.js';

        let rfb;
        const host = window.location.hostname;
        const port = window.location.port || (window.location.protocol === 'https:' ? 443 : 80);
        const path = `/vnc?vm_name={{ vm_name }}`;

        document.addEventListener("DOMContentLoaded", () => {
            const statusEl   = document.getElementById('status');
            const cbText     = document.getElementById('clipboard-text');
            const sendBtn    = document.getElementById('send-btn');
            const pasteBtn   = document.getElementById('paste-btn');
            const copyBtn    = document.getElementById('copy-btn');

            rfb = new RFB(document.getElementById('vnc-canvas'), `ws://${host}:${port}${path}`);
            rfb.scaleViewport = true;

            rfb.addEventListener("connect", () => {
                statusEl.textContent = 'Connected';
                statusEl.className = 'connected';
                document.getElementById('vnc-canvas').focus();
            });

            rfb.addEventListener("disconnect", () => {
                statusEl.textContent = 'Disconnected';
                statusEl.className = 'disconnected';
            });

            // VM → host: VM copied something, show it in textarea
            rfb.addEventListener("clipboard", (e) => {
                cbText.value = e.detail.text;
                flash(copyBtn);
            });

            // Send textarea text → VM clipboard
            sendBtn.addEventListener('click', () => {
                const text = cbText.value;
                if (!text) return;
                rfb.clipboardPasteFrom(text);
                flash(sendBtn);
            });

            // Read from browser clipboard → textarea → VM
            pasteBtn.addEventListener('click', async () => {
                try {
                    const text = await navigator.clipboard.readText();
                    cbText.value = text;
                    rfb.clipboardPasteFrom(text);
                    flash(pasteBtn);
                } catch {
                    cbText.focus();
                    cbText.select();
                    alert('Clipboard access denied. Paste manually into the text box and click Send.');
                }
            });

            // Copy textarea content to browser clipboard
            copyBtn.addEventListener('click', () => {
                if (!cbText.value) return;
                navigator.clipboard.writeText(cbText.value).catch(() => {
                    cbText.select();
                    document.execCommand('copy');
                });
                flash(copyBtn);
            });

            // Ctrl+Enter in textarea → send to VM
            cbText.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && e.ctrlKey) {
                    e.preventDefault();
                    sendBtn.click();
                }
            });

            function flash(btn) {
                btn.classList.add('success');
                setTimeout(() => btn.classList.remove('success'), 800);
            }
        });
    </script>
</head>
<body>
    <div id="topbar">
        <button class="back-btn" onclick="window.history.back()">← Back</button>
        <span class="title">VNC — {{ vm_name }}</span>
        <span id="status">Connecting…</span>
        <div id="clipboard-area">
            <textarea id="clipboard-text" placeholder="Paste text here…" rows="1"></textarea>
            <button id="paste-btn" class="cb-btn secondary" title="Read from browser clipboard and send to VM">📋 Paste</button>
            <button id="send-btn" class="cb-btn" title="Send textarea text to VM (Ctrl+Enter)">Send →</button>
            <button id="copy-btn" class="cb-btn secondary" title="Copy textarea text to browser clipboard">Copy ↑</button>
        </div>
    </div>
    <div id="vnc-canvas"></div>
</body>
</html>
