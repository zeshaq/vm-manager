<!DOCTYPE html>
<html>
<head>
    <title>VNC — {{ vm_name }}</title>
    <meta charset="utf-8">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { background: #000; overflow: hidden; width: 100%; height: 100%; }
        #vnc-canvas { width: 100vw; height: 100vh; }
        #vnc-canvas > * { width: 100% !important; height: 100% !important; }
    </style>
    <script type="module">
        import RFB from 'https://cdn.jsdelivr.net/npm/@novnc/novnc/core/rfb.js';

        const host = window.location.hostname;
        const port = window.location.port || (window.location.protocol === 'https:' ? 443 : 80);

        document.addEventListener("DOMContentLoaded", () => {
            const rfb = new RFB(
                document.getElementById('vnc-canvas'),
                `ws://${host}:${port}/vnc?vm_name={{ vm_name }}`
            );
            rfb.scaleViewport = true;
            rfb.resizeSession = false;

            rfb.addEventListener("clipboard", (e) => {
                navigator.clipboard.writeText(e.detail.text).catch(() => {});
            });
        });
    </script>
</head>
<body>
    <div id="vnc-canvas"></div>
</body>
</html>
