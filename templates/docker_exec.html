<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shell — {{ container_name }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0f172a; font-family: monospace; }
    #header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; background: #1e293b; border-bottom: 1px solid #334155;
    }
    #header .title { color: #94a3b8; font-size: 13px; }
    #header .title span { color: #38bdf8; font-weight: 600; }
    #status {
      font-size: 12px; font-weight: 600; padding: 2px 10px;
      border-radius: 99px; background: #374151; color: #9ca3af;
    }
    #status.connected  { background: #14532d; color: #4ade80; }
    #status.error      { background: #7f1d1d; color: #f87171; }
    #terminal-wrap { height: calc(100vh - 41px); padding: 6px; }
    #terminal { height: 100%; }
    .xterm-viewport::-webkit-scrollbar { width: 6px; }
    .xterm-viewport::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="header">
    <div class="title">Container shell — <span>{{ container_name }}</span></div>
    <div id="status">CONNECTING…</div>
  </div>
  <div id="terminal-wrap">
    <div id="terminal"></div>
  </div>

  <script>
    const containerId = {{ container_id | tojson }};
    const statusEl = document.getElementById('status');

    const term = new Terminal({
      cursorBlink: true,
      fontSize: 14,
      fontFamily: '"Cascadia Code", "Fira Code", "JetBrains Mono", monospace',
      theme: {
        background:  '#0f172a',
        foreground:  '#cbd5e1',
        cursor:      '#38bdf8',
        black:       '#1e293b',
        brightBlack: '#475569',
        red:         '#f87171',
        green:       '#4ade80',
        yellow:      '#facc15',
        blue:        '#60a5fa',
        magenta:     '#c084fc',
        cyan:        '#38bdf8',
        white:       '#e2e8f0',
        brightWhite: '#f8fafc',
      }
    });

    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    fitAddon.fit();
    term.focus();

    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${proto}//${location.host}/docker-exec-ws?container_id=${encodeURIComponent(containerId)}`);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      statusEl.textContent = 'CONNECTED';
      statusEl.className = 'connected';
      // Send initial terminal size
      const dims = { cols: term.cols, rows: term.rows };
      ws.send(JSON.stringify({ type: 'resize', ...dims }));
    };

    ws.onmessage = (ev) => {
      if (typeof ev.data === 'string') {
        term.write(ev.data);
      } else {
        term.write(new Uint8Array(ev.data));
      }
    };

    ws.onclose = () => {
      statusEl.textContent = 'DISCONNECTED';
      statusEl.className = 'error';
      term.write('\r\n\r\n\x1b[33mConnection closed.\x1b[0m\r\n');
    };

    ws.onerror = () => {
      statusEl.textContent = 'ERROR';
      statusEl.className = 'error';
    };

    term.onData(data => {
      if (ws.readyState === WebSocket.OPEN) ws.send(data);
    });

    window.addEventListener('resize', () => {
      fitAddon.fit();
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      }
    });
  </script>
</body>
</html>
